name: Cleanup PR Preview

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Cleanup preview via webhook
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}

          echo "🧹 Cleaning up PR #${PR_NUMBER} preview via webhook..."

          RESPONSE=$(curl -s -X POST https://webhook.poodle-kit.my/webhook/pr-preview \
            -H "Content-Type: application/json" \
            -d "{
              \"secret\": \"${{ secrets.WEBHOOK_SECRET }}\",
              \"action\": \"cleanup\",
              \"pr_number\": \"${PR_NUMBER}\"
            }")

          echo "Webhook response: $RESPONSE"
          echo "✅ Cleanup request sent successfully"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: "## 🧹 Preview Cleanup\n\nPreview deployment for PR #" + prNumber + " has been cleaned up.\n\nContainer and resources have been removed from the server."
            });
