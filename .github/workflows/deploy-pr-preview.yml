name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy preview to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: dreampaste.com
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            # 환경 변수 설정
            export PR_NUMBER=${{ github.event.pull_request.number }}
            export CONTAINER_NAME="poodle-docs-pr-${PR_NUMBER}"
            export IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${PR_NUMBER}"
            export PORT=$((3000 + $PR_NUMBER))
            export SUBDOMAIN="pr-${PR_NUMBER}.poodle-kit.my"

            echo "Deploying PR #${PR_NUMBER} to port ${PORT}"

            # 기존 PR 컨테이너 중지 및 제거
            docker stop $CONTAINER_NAME 2>/dev/null || true
            docker rm $CONTAINER_NAME 2>/dev/null || true

            # 최신 이미지 pull
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            docker pull $IMAGE

            # 새 컨테이너 실행
            docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              -p $PORT:3000 \
              -e NODE_ENV=production \
              -e PR_NUMBER=$PR_NUMBER \
              $IMAGE

            # Caddy 설정 업데이트
            sudo /usr/local/bin/deploy-poodle-pr.sh $PR_NUMBER $PORT

            # 로그 확인
            echo "Waiting for container to start..."
            sleep 5
            docker logs $CONTAINER_NAME --tail 30

            # 컨테이너 상태 확인
            if docker ps | grep -q $CONTAINER_NAME; then
              echo "✅ PR Preview container is running"
            else
              echo "❌ PR Preview container failed to start"
              exit 1
            fi

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = "https://pr-" + prNumber + ".poodle-kit.my";
            const commitHash = context.sha.substring(0, 7);

            const body = "## 🐩 Poodle Docs Preview Deployment\n\n" +
              "Your preview deployment is ready!\n\n" +
              "🔗 **Preview URL**: " + previewUrl + "\n\n" +
              "This preview will be automatically updated when you push new commits.\n\n" +
              "---\n" +
              "_Deployed from commit " + commitHash + "_";

            // 기존 코멘트 찾기
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Poodle Docs Preview Deployment')
            );

            if (botComment) {
              // 기존 코멘트 업데이트
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              // 새 코멘트 생성
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body
              });
            }
